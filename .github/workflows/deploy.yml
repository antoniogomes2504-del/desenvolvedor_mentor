name: Deploy GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Validar + testar antes do deploy
  # ──────────────────────────────────────────────
  test:
    name: Validação + Testes antes do deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Validar estrutura do projeto
        run: npm run validate

      - name: Rodar testes (bloqueia deploy se falhar)
        run: npm run test:ci

  # ──────────────────────────────────────────────
  # Job 2: Deploy somente se testes passaram
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy para GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload do artefato (pasta src/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src/'

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
